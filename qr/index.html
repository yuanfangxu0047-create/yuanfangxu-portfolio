<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>袁方旭｜个人网站二维码</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f7f8fc;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: #162136;
    }
    .card {
      width: min(92vw, 420px);
      background: #fff;
      border: 1px solid #dde4f0;
      border-radius: 24px;
      box-shadow: 0 18px 40px rgba(28,46,89,.10);
      padding: 28px;
      text-align: center;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 26px;
    }
    p {
      margin: 0 0 18px;
      color: #5c667a;
      line-height: 1.7;
      font-size: 15px;
    }
    img {
      width: 220px;
      height: 220px;
      border-radius: 16px;
      border: 1px solid #dde4f0;
      background: #fff;
    }
    a {
      display: inline-block;
      margin-top: 18px;
      color: #2b63ff;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>袁方旭</h1>
    <p>扫描二维码或点击下方链接，访问我的个人网站。</p>
    <img id="qr" alt="个人网站二维码" />
    <div>
      <a id="siteLink" href="#">打开个人网站</a>
    </div>
  </div>

  <script>
    const baseUrl = window.location.origin + window.location.pathname.replace(/\/qr\/?$/, '');
    const qrTarget = baseUrl + '/';
    document.getElementById('qr').src =
      'https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=' +
      encodeURIComponent(qrTarget);
    document.getElementById('siteLink').href = qrTarget;
  </script>
</body>
</html>
